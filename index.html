<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <link rel="stylesheet" href="style.css">

    <!-- pdf-lib for modifying PDFs -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- pdf.js for rendering PDFs to Canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set the workerSrc for pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>
    <header>
        <h1>PDF Editor</h1>
    </header>

    <div class="toolbar">
        <input type="file" id="upload-pdf" accept="application/pdf" />

        <div id="edit-controls" class="hidden">
            <button id="add-text-btn">Add Text</button>
            <button id="export-btn" class="primary">Export PDF</button>
        </div>
    </div>

    <div class="main-container">
        <div id="viewer-container" class="viewer-container">
            <!-- PDF pages will be rendered here as canvas elements -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
