<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Modifier Web App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Simple PDF Modifier</h1>
        <p>Upload a PDF, add some text, and download the updated file.</p>

        <div class="controls">
            <input type="file" id="upload-pdf" accept="application/pdf" />
            
            <div id="edit-controls" class="hidden">
                <input type="text" id="add-text-input" placeholder="Type text to add..." />
                <button id="add-text-btn">Add Text & Save</button>
            </div>
        </div>

        <div class="preview-section">
            <h2>PDF Preview</h2>
            <iframe id="pdf-preview" width="100%" height="500px"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
