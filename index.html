<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor (Whiteout Hack)</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>PDF Whiteout Editor</h1>
        <p>Upload a PDF, use "Whiteout" to hide old text, type over it, and export!</p>

        <div class="controls">
            <input type="file" id="upload-pdf" accept="application/pdf" />
            
            <div id="edit-controls" class="hidden">
                <button id="whiteout-btn" class="tool-btn">🟪 Add Whiteout Box</button>
                <button id="text-btn" class="tool-btn">📝 Add Text</button>
                <button id="export-btn" class="export-btn">💾 Export PDF</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
